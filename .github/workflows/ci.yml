name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  lint-typecheck:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck API
        run: pnpm --filter api exec tsc --noEmit

      - name: Typecheck web
        run: pnpm --filter web exec tsc --noEmit

  api-integration:
    name: API integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tm_test
          POSTGRES_USER: tm_user
          POSTGRES_PASSWORD: tm_pass
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://tm_user:tm_pass@localhost:5433/tm_test
      COGNITO_USER_POOL_ID: us-east-1_test
      COGNITO_CLIENT_ID: test_client_id
      COGNITO_REGION: us-east-1
      NODE_ENV: test
      PORT: 3001

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations on test DB
        run: pnpm --filter api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://tm_user:tm_pass@localhost:5433/tm_test

      - name: Run API integration tests
        run: pnpm --filter api test:integration

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [lint-typecheck]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tm_e2e
          POSTGRES_USER: tm_user
          POSTGRES_PASSWORD: tm_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter e2e exec playwright install --with-deps chromium

      - name: Run migrations + seed
        run: |
          pnpm --filter api exec prisma migrate deploy
          pnpm --filter api exec prisma db seed
        env:
          DATABASE_URL: postgresql://tm_user:tm_pass@localhost:5432/tm_e2e

      - name: Build web
        run: pnpm --filter web build
        env:
          VITE_API_BASE_URL: http://localhost:3001

      - name: Run E2E tests
        run: pnpm --filter e2e test
        env:
          DATABASE_URL: postgresql://tm_user:tm_pass@localhost:5432/tm_e2e
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID_TEST }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID_TEST }}
          COGNITO_REGION: eu-west-1

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7
